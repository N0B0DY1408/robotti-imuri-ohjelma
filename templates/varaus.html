<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>varaus</title>
    <link rel="stylesheet" href="/static/tyyli.css"/>
</head>

<main>

    <header>
        <img id="logo" src="https://www.kpedu.fi/ResourcePackages/KPedu/assets/dist/images/logo.png"></img>
        <h1 id="teksti">Tällä sivulla pääset varaamaan robotteja käyttöösi</h1>
    </header>

    <nav>
        <!---navigointi mahdollisten sivujen välillä ja sign uppi ja kirjautuminen-->
        <form method="post">
            <select name="robotit" id="robottidropdown" method="GET",required>
                {% for robo in robots %}
                <option value= "{{robo}}" SELECTED>{{robo}}</option>"
                {% endfor %}
            </select>
            <input type="date" name="the_date" id="varausdate",required>
            <label for="varausdate">päivä</label>
            <input type="time" name="the_time"id="varaustime",required>
            <label for="varaustime">kellonaika</label>
            <input type="number" name="length" id="varauspituus",required>
            <label for="varauspituus">kuinka monta tuntia</label>
            <input type="submit" id="varaa" value="varaa">
        </form>

        <button href="help.html">Apua</button>
        <br>
        //luuranko sivu jotta saadaan tämä kohta projektista alkuun
        <br>
        <div style="background-color: red;"><p>aikajana valitusta robotista</p></div>
    </nav>

    
        

    <body>
        <!---robotin varaus kentät Sähköpostilla. tarkistaa että on kpedu sähköposti ja niin että kpedu on oikeassa kohtaa jotta tunnistaa opettajaksi--->
    </body>

    <script src="/static/script.js"></script>

    <aside>
        <!---kuva siitä missä se robotti on ollut--->
    </aside>

</main>

</html>
