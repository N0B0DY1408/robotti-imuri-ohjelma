<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etusivu</title>
    <link rel="stylesheet" href="/static/tyyli.css"/>
</head>

<main>

    <header>
        <img id="logo" src="https://www.kpedu.fi/ResourcePackages/KPedu/assets/dist/images/logo.png"></img>
        <h1 id="teksti">Tällä sivulla pääset varaamaan robotteja käyttöösi</h1>
    </header>

    <nav>
        <!---navigointi mahdollisten sivujen välillä ja sign uppi ja kirjautuminen-->
        <dialog id="loginDialog">
            <button id="closeDialog" autofocus>Sulje</button>

            <p>Kirjoita sähköpostisi</p>

            <form id="popupForm">
                <input type="email" name="email" required>
                <button type="submit" class="send">Lähetä</button>
            </form>

            <form id="codeForm" hidden>
                <p>Syötä sähköpostiisi lähetetty koodi</p>
                <input type="text" name="code" required>
                <button type="submit">Vahvista</button>
            </form>

            <div id="result" hidden></div>

        </dialog>

        <button id="login">Kirjaudu/rekisteröidy</button>


        <button href="help.html">Apua</button>
    </nav>

    
        

    <body>
        <!---robotin varaus kentät Sähköpostilla. tarkistaa että on kpedu sähköposti ja niin että kpedu on oikeassa kohtaa jotta tunnistaa opettajaksi--->
    </body>

    <script src="/static/script.js"></script>

    <aside>
        <!---kuva siitä missä se robotti on ollut--->
    </aside>

</main>

</html>
