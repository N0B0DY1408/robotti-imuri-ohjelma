<!DOCTYPE html>
<html lang="fi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etusivu</title>

    <link rel="stylesheet" href="/static/tyyli.css"/>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>

    <link href="https://cdn.jsdelivr.net/npm/tom-select@2.5.2/dist/css/tom-select.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/tom-select@2.5.2/dist/js/tom-select.complete.min.js"></script>
</head>

<body>

<main>

<header>
    <img id="logo" src="https://www.kpedu.fi/ResourcePackages/KPedu/assets/dist/images/logo.png">
    <h1 id="teksti">Tällä sivulla pääset varaamaan robotteja käyttöösi</h1>
</header>

<nav>
    <button class="btn btn-info btn-lg" data-toggle="modal" data-target="#authModal">
        Kirjaudu / Rekisteröidy
    </button>

    <a href="help.html" class="btn btn-info btn-lg">Apua</a>
</nav>

<!-- LOGIN MODAL -->
<div class="modal fade" id="authModal" role="dialog">
<div class="modal-dialog">
<div class="modal-content">

<div class="modal-header">
<button type="button" class="close" data-dismiss="modal">&times;</button>
<h4 class="modal-title" id="modalTitle">Kirjoita sähköpostisi</h4>
</div>

<div class="modal-body">

<!-- EMAIL VIEW -->
<div id="emailView">
<form id="signupForm">

<select id="select-email" name="email" placeholder="matti.meikalainen@student.kpedu.fi">
{% for user in users %}
<option value="{{user}}">{{user}}</option>
{% endfor %}
</select>

<select name="room" id="roomSelect">

{% for room in room_display %}
<option value="{{ room }}">{{ room }}</option>
{% endfor %}

</select>
<br>

<input class="form-check-input" type="checkbox" id="check1" required>
<label class="form-check-label">
Hyväksyn että työpaikka vakoilee miten siivoan huonettani
</label>

<br>

<button type="submit" class="btn btn-primary">Lähetä</button>

</form>
</div>

<!-- CODE VIEW -->
<div id="codeView" style="display:none;">
<p>Kirjoita sähköpostiisi lähetetty koodi</p>

<form id="codeForm">

<input type="text" name="code" required class="form-control">

<br>

<button type="submit" class="btn btn-success">Vahvista</button>

</form>
</div>

<!-- SUCCESS VIEW -->
<div id="successView" style="display:none;">
<h4>Koodi hyväksytty!</h4>
<p>Kirjautuminen onnistui.</p>
</div>

</div>
</div>
</div>
</div>

<!-- VARAUS -->
<div class="container d-flex justify-content-center align-items-center full-height">

<div class="circle-wrapper">

<div class="outer-dashed"></div>

<div class="circle-card">

<h4 class="text-success">Ehdotettu</h4>

<select class="border p-2 px-5" name="robotit" id="robottidropdown">

{% for room in room_display %}
<option value="{{room}}">{{room}}</option>
{% endfor %}

</select>

<h5 class="mt-3">Historia</h5>

            <div class="d-flex gap-5 align-items-center mt-2">
                <span class="border px-3 py-1 ">{{varaus_room}}</span>
                  <span class="text-danger">{{varaus_name}}</span>
            </div>

<p id="timer"></p>

<button class="btn btn-varaus mt-3">
Varaa
</button>

</div>
</div>
</div>
    
        

    <body>
        <!---robotin varaus kentät Sähköpostilla. tarkistaa että on kpedu sähköposti ja niin että kpedu on oikeassa kohtaa jotta tunnistaa opettajaksi--->
    </body>

    <script src="/static/script.js"></script>

    <aside>
        <!---kuva siitä missä se robotti on ollut--->
    </aside>

</main>

<aside>
<!-- robottien sijaintikuva -->
</aside>

<script src="/static/script.js"></script>
<script src="/static/time.js"></script>

</body>
</html>
