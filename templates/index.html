<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etusivu</title>
    <link rel="stylesheet" href="/static/tyyli.css"/>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
</head>

<main>

    <header>
        <img id="logo" src="https://www.kpedu.fi/ResourcePackages/KPedu/assets/dist/images/logo.png"></img>
        <h1 id="teksti">Tällä sivulla pääset varaamaan robotteja käyttöösi</h1>
    </header>

    <button class="btn btn-info btn-lg" data-toggle="modal" data-target="#authModal">
    Kirjaudu / Rekisteröidy
    </button>

    <!-- Bootstrap modal -->
    <div class="modal fade" id="authModal" role="dialog">
    <div class="modal-dialog">
        <div class="modal-content">
        
        <div class="modal-header">
            <button type="button" class="close" data-dismiss="modal">&times;</button>
            <h4 class="modal-title" id="modalTitle">Kirjoita sähköpostisi</h4>
        </div>

        <div class="modal-body">

            <!-- 1️⃣ EMAIL VIEW -->
            <div id="emailView">
            <form id="signupForm">
                <input type="email" name="email" required class="form-control">
                <br>
                <button type="submit" class="btn btn-primary">Lähetä</button>
            </form>
            </div>

            <!-- 2️⃣ CODE VIEW -->
            <div id="codeView" style="display:none;">
            <p>Kirjoita sähköpostiisi lähetetty koodi</p>
            <form id="codeForm">
                <input type="text" name="code" required class="form-control">
                <br>
                <button type="submit" class="btn btn-success">Vahvista</button>
            </form>
            </div>

            <!-- 3️⃣ SUCCESS VIEW -->
            <div id="successView" style="display:none;">
            <h4>Koodi hyväksytty!</h4>
            <p>Kirjautuminen onnistui.</p>
            </div>

        </div>
        </div>
    </div>
    </div>

        <button href="help.html">Apua</button>
    </nav>

    
        

    <body>
        <!---robotin varaus kentät Sähköpostilla. tarkistaa että on kpedu sähköposti ja niin että kpedu on oikeassa kohtaa jotta tunnistaa opettajaksi--->
    </body>

    <script src="/static/script.js"></script>

    <aside>
        <!---kuva siitä missä se robotti on ollut--->
    </aside>

</main>

</html>
